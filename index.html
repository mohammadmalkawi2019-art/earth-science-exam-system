<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>نظام اختبارات علوم الأرض</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>نظام اختبار علوم الأرض</h1>

    <label>اختر الوحدة:</label>
    <select id="unit">
      <option value="galaxies_full.json">المجرات</option>
      <option value="earth_history_full.json">تاريخ الأرض</option>
      <option value="severe_weather_full.json">أحوال الطقس القاسية</option>
    </select>

    <label>عدد الأسئلة:</label>
    <input type="number" id="count" value="10" min="1">

    <button onclick="generateExam()">إنشاء الاختبار</button>
    <button onclick="window.print()">طباعة</button>

    <div id="exam"></div>
    <div id="answers"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
