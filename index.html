<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام الاختبار الإلكتروني</title>
<style>
body{font-family:Tahoma;background:#f4f6fb;margin:0}
header,footer{background:#1e88e5;color:#fff;padding:12px;text-align:center}
.container{max-width:900px;margin:20px auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 0 10px rgba(0,0,0,.1)}
button{padding:10px 18px;margin:8px;border:none;border-radius:8px;background:#1e88e5;color:#fff;cursor:pointer}
button:hover{background:#1565c0}
.hidden{display:none}
.option{display:block;margin:8px 0;padding:8px;border:1px solid #ddd;border-radius:8px;cursor:pointer}
.timer{font-weight:bold;color:#d32f2f}
select,input{padding:8px;border-radius:6px;border:1px solid #ccc}
.review-box{margin:10px 0;padding:10px;border:1px solid #ccc;border-radius:8px}
.correct{color:green}
.wrong{color:red}
</style>
</head>
<body>

<header>نظام الاختبار الإلكتروني</header>

<div class="container">

<!-- الشاشة الرئيسية -->
<div id="home">
<h3>إعداد المعلم: محمد ملكاوي</h3>
<label>اسم الطالب:</label>
<input type="text" id="studentName"><br><br>

<label>اختر الوحدة:</label>
<select id="unitSelect">
<option value="احوال الطقس القاسية.json">أحوال الطقس القاسية</option>
<option value="المجرات.json">المجرات ونشأة الكون</option>
<option value="تاريخ الارض.json">تاريخ الأرض</option>
</select><br><br>

<button onclick="startExam()">بدء الاختبار</button>
</div>

<!-- شاشة الاختبار -->
<div id="exam" class="hidden">
<div>الوقت المتبقي: <span class="timer" id="timer">70</span> ثانية</div>
<h3 id="questionText"></h3>
<div id="optionsBox"></div>
<button onclick="nextQuestion()">السؤال التالي</button>
<button onclick="goHome()">العودة للرئيسية</button>
</div>

<!-- شاشة النتيجة -->
<div id="result" class="hidden">
<h3>النتيجة النهائية</h3>
<p id="finalScore"></p>
<p id="totalTime"></p>
<div id="review"></div>
<button onclick="goHome()">العودة للرئيسية</button>
</div>

</div>

<footer>إعداد المعلم محمد ملكاوي</footer>

<script>
let questions = [];
let selectedQuestions = [];
let currentIndex = 0;
let score = 0;
let timerInterval;
let timeLeft = 70;
let totalSeconds = 0;
let answersReview = [];

/* ========= مرونة قراءة أي JSON ========= */
function normalizeQuestions(data){
let all=[];
if(data.questions){
for(let key in data.questions){
if(Array.isArray(data.questions[key])){
all=all.concat(data.questions[key]);
}
}
}
if(Array.isArray(data)) all=data;

return all.map(q=>{
let options=q.options||[];
let correct=q.correct_answer;
if(correct==="أ") correct=options[0];
if(correct==="ب") correct=options[1];
if(correct==="ج") correct=options[2];
if(correct==="د") correct=options[3];
return {question:q.question,options:options,correct_answer:correct};
});
}

/* ========= بدء الاختبار ========= */
async function startExam(){
const name=document.getElementById("studentName").value.trim();
if(!name){alert("أدخل اسم الطالب");return;}

const file=document.getElementById("unitSelect").value;
const response=await fetch(file);
const data=await response.json();
questions=normalizeQuestions(data);

if(questions.length<50){
alert("عدد الأسئلة أقل من 50 — سيتم استخدام جميع الأسئلة المتاحة");
selectedQuestions=shuffle([...questions]);
}else{
selectedQuestions=shuffle([...questions]).slice(0,50);
}

currentIndex=0;
score=0;
totalSeconds=0;
answersReview=[];

document.getElementById("home").classList.add("hidden");
document.getElementById("exam").classList.remove("hidden");

showQuestion();
}

/* ========= عرض السؤال ========= */
function showQuestion(){
resetTimer();
const q=selectedQuestions[currentIndex];
document.getElementById("questionText").innerText=
`(${currentIndex+1}) ${q.question}`;
const box=document.getElementById("optionsBox");
box.innerHTML="";

q.options.forEach(opt=>{
const div=document.createElement("div");
div.className="option";
div.innerText=opt;
div.onclick=()=>selectAnswer(opt);
box.appendChild(div);
});
}

/* ========= اختيار إجابة ========= */
function selectAnswer(selected){
const q=selectedQuestions[currentIndex];
if(selected===q.correct_answer) score++;

answersReview.push({
question:q.question,
correct:q.correct_answer,
selected:selected
});

clearInterval(timerInterval);
nextQuestion();
}

/* ========= التالي ========= */
function nextQuestion(){
currentIndex++;
if(currentIndex>=selectedQuestions.length){
endExam();
}else{
showQuestion();
}
}

/* ========= انتهاء ========= */
function endExam(){
document.getElementById("exam").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

document.getElementById("finalScore").innerText=
`الدرجة: ${score} / ${selectedQuestions.length}`;

document.getElementById("totalTime").innerText=
`الوقت المستغرق: ${totalSeconds} ثانية`;

let reviewBox=document.getElementById("review");
reviewBox.innerHTML="<h4>مراجعة الإجابات:</h4>";

answersReview.forEach(r=>{
let div=document.createElement("div");
div.className="review-box";
div.innerHTML=
`<strong>${r.question}</strong><br>
إجابتك: <span class="${r.selected===r.correct?'correct':'wrong'}">${r.selected}</span><br>
الإجابة الصحيحة: <span class="correct">${r.correct}</span>`;
reviewBox.appendChild(div);
});
}

/* ========= العداد ========= */
function resetTimer(){
timeLeft=70;
document.getElementById("timer").innerText=timeLeft;
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
timeLeft--;
totalSeconds++;
document.getElementById("timer").innerText=timeLeft;
if(timeLeft<=0){
clearInterval(timerInterval);
answersReview.push({
question:selectedQuestions[currentIndex].question,
correct:selectedQuestions[currentIndex].correct_answer,
selected:"لم يجب"
});
nextQuestion();
}
},1000);
}

/* ========= خلط ========= */
function shuffle(array){
for(let i=array.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
return array;
}

/* ========= رجوع ========= */
function goHome(){
location.reload();
}
</script>

</body>
</html>
