<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام الاختبار</title>
<style>
body{font-family:Arial;background:#f4f6f9;text-align:center}
.container{width:60%;margin:auto;background:#fff;padding:30px;margin-top:40px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,.1)}
button{padding:10px 20px;margin:10px;cursor:pointer}
.progress-bar{height:20px;background:#ddd;border-radius:10px;overflow:hidden;margin:20px 0}
.progress{height:100%;background:#4CAF50;width:0%}
.timer{color:red;font-size:18px;margin-bottom:10px}
.option{display:block;margin:8px 0}
</style>
</head>
<body>

<div class="container">
<h2>اختبار علوم الأرض</h2>

<div id="start">
<button onclick="startExam()">ابدأ الاختبار</button>
</div>

<div id="quiz" style="display:none;">
<div class="timer">الوقت المتبقي: <span id="time">75</span></div>
<div class="progress-bar"><div class="progress" id="progress"></div></div>
<h3 id="question"></h3>
<div id="options"></div>
<button onclick="nextQuestion()">التالي</button>
</div>

<div id="result" style="display:none;">
<h3>النتيجة النهائية</h3>
<div id="resultText"></div>
<button onclick="location.reload()">إعادة الاختبار</button>
</div>

</div>

<script>

let allQuestions=[]
let questions=[]
let current=0
let score=0
let timer
let timeLeft=75
let unanswered=0

async function loadQuestions(){
const files=["galaxies.json","earth.json","weather.json"]
for(let file of files){
let res=await fetch(file)
let data=await res.json()
allQuestions=allQuestions.concat(data)
}
}

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5)
}

async function startExam(){
await loadQuestions()
questions=shuffle([...allQuestions]).slice(0,50)
document.getElementById("start").style.display="none"
document.getElementById("quiz").style.display="block"
showQuestion()
}

function showQuestion(){
if(current>=questions.length){showResult();return}

timeLeft=75
document.getElementById("time").textContent=timeLeft

let q=questions[current]
document.getElementById("question").textContent=`(${current+1}/50) ${q.question}`

let html=""
q.options.forEach((opt,i)=>{
html+=`<label class="option">
<input type="radio" name="opt" value="${i}">
${opt}
</label>`
})

document.getElementById("options").innerHTML=html
updateProgress()
startTimer()
}

function startTimer(){
clearInterval(timer)
timer=setInterval(()=>{
timeLeft--
document.getElementById("time").textContent=timeLeft
if(timeLeft<=0){
clearInterval(timer)
nextQuestion()
}
},1000)
}

function nextQuestion(){
clearInterval(timer)

let selected=document.querySelector('input[name="opt"]:checked')
if(selected){
if(parseInt(selected.value)===questions[current].correct){
score++
}
}else{
unanswered++
}

current++
showQuestion()
}

function updateProgress(){
let percent=(current/50)*100
document.getElementById("progress").style.width=percent+"%"
}

function showResult(){
document.getElementById("quiz").style.display="none"
document.getElementById("result").style.display="block"

let percent=Math.round((score/50)*100)

let grade=""
if(percent>=90) grade="ممتاز"
else if(percent>=80) grade="جيد جداً"
else if(percent>=70) grade="جيد"
else if(percent>=60) grade="مقبول"
else grade="ضعيف"

document.getElementById("resultText").innerHTML=
`
عدد الأسئلة: 50<br>
الإجابات الصحيحة: ${score}<br>
غير المجابة: ${unanswered}<br>
النسبة المئوية: ${percent}%<br>
التقدير: ${grade}
`
}

</script>

</body>
</html>
